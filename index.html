
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS-Ω | Fractal UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #06b6d4;
            --ethereal-purple: #8b5cf6;
            --vibrant-pink: #d946ef;
            --deep-obsidian: #030308;
            --deep-indigo: #0f172a;
            --nebula-glow: rgba(139, 92, 246, 0.15);
        }
        body {
            background-color: var(--deep-obsidian);
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .font-display { font-family: 'Outfit', sans-serif; }
        .jetbrains-mono { font-family: 'JetBrains Mono', monospace; }
        
        @keyframes rotateTensor {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .tensor-loader {
            animation: rotateTensor 10s linear infinite;
        }

        @keyframes pulseFractal {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.02); }
        }
        .fractal-bg {
            animation: pulseFractal 12s ease-in-out infinite;
        }

        .glass-panel {
            background: rgba(15, 15, 25, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        }
        
        .neon-shadow-purple {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .neon-text-purple {
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.8);
        }

        .neon-text-cyan {
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--ethereal-purple), var(--vibrant-pink));
            border-radius: 10px;
        }

        /* Mobile specific fixes */
        @media (max-width: 640px) {
            .glass-panel {
                backdrop-filter: blur(8px);
            }
        }
    </style>
<script type="importmap">

</head>

</html>
