
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS-Ω | Fractal UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --deep-obsidian: #050505;
            --mystery-purple: #2a0a4d;
        }
        body {
            background-color: var(--deep-obsidian);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .jetbrains-mono { font-family: 'JetBrains Mono', monospace; }
        
        @keyframes rotateTensor {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .tensor-loader {
            animation: rotateTensor 10s linear infinite;
        }

        @keyframes pulseFractal {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.25; transform: scale(1.05); }
        }
        .fractal-bg {
            animation: pulseFractal 8s ease-in-out infinite;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        .neon-shadow {
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 10px;
        }
    </style>
